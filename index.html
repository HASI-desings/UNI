<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#040404">
  <meta name="description" content="Parallax - Academic GPA Tracker">
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Parallax">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/animations.css">
  <link rel="stylesheet" href="./css/responsive.css">
  
  <title>Parallax</title>
  <style>
    body { margin: 0; padding: 0; background: #040404; color: #fff; font-family: 'Inter', sans-serif; }
    .hidden { display: none !important; }
    .screen { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-screen { background: #040404; }
    .app-screen { background: #0a0a0a; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen login-screen">
    <div style="text-align: center; max-width: 400px; padding: 20px;">
      <h1 style="font-size: 48px; margin: 0 0 10px 0; color: #00C896;">PARALLAX</h1>
      <p style="color: rgba(255,255,255,0.6); margin: 0 0 40px 0;">Academic GPA Tracker</p>
      
      <form id="login-form" style="display: flex; flex-direction: column; gap: 20px;">
        <div>
          <label style="display: block; margin-bottom: 8px; font-size: 12px; color: rgba(255,255,255,0.7);">SELECT USER</label>
          <select id="user-select" style="width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; font-size: 14px;">
            <option value="">Choose a user...</option>
            <option value="hussnain">Hussnain</option>
            <option value="faizan">Faizan</option>
            <option value="alima">Alima</option>
            <option value="haroon">Haroon</option>
            <option value="mahdiya">Mahdiya</option>
          </select>
        </div>
        
        <div>
          <label style="display: block; margin-bottom: 8px; font-size: 12px; color: rgba(255,255,255,0.7);">ENTER PIN</label>
          <input type="password" id="pin-input" maxlength="4" inputmode="numeric" placeholder="••••" style="width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; font-size: 18px; text-align: center; letter-spacing: 8px;">
        </div>
        
        <button type="submit" style="padding: 12px; background: #00C896; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;">ENTER PORTAL</button>
        
        <div id="login-error" style="color: #FF6B6B; font-size: 12px; display: none;"></div>
      </form>
    </div>
  </div>

  <!-- App Screen -->
  <div id="app-screen" class="screen app-screen hidden">
    <div style="width: 100%; height: 100%; display: flex; flex-direction: column;">
      <!-- Header -->
      <div style="padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; font-size: 24px;">Parallax</h2>
        <button id="logout-btn" style="padding: 8px 16px; background: #FF6B6B; color: #fff; border: none; border-radius: 6px; cursor: pointer;">Logout</button>
      </div>

      <!-- Content -->
      <div style="flex: 1; overflow-y: auto; padding: 20px;">
        <!-- Dashboard -->
        <div id="dashboard" style="display: grid; gap: 20px;">
          <div style="background: #1a1a1a; padding: 20px; border-radius: 12px; text-align: center;">
            <div style="font-size: 48px; color: #00C896; font-weight: bold;" id="cgpa-display">3.42</div>
            <div style="color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 8px;">LIVE CGPA</div>
          </div>

          <div style="background: #1a1a1a; padding: 20px; border-radius: 12px;">
            <h3 style="margin: 0 0 16px 0; font-size: 14px; color: rgba(255,255,255,0.7);">COURSES</h3>
            <div id="courses-list" style="display: grid; gap: 12px;"></div>
          </div>

          <div style="background: #1a1a1a; padding: 20px; border-radius: 12px;">
            <h3 style="margin: 0 0 16px 0; font-size: 14px; color: rgba(255,255,255,0.7);">RECENT ACTIVITY</h3>
            <div id="activity-list" style="display: grid; gap: 12px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // App State
    const state = {
      user: null,
      courses: [
        { id: 1, name: 'Physics 101', grade: 'A', credits: 4 },
        { id: 2, name: 'Chemistry Lab', grade: 'B+', credits: 3 },
        { id: 3, name: 'Calculus II', grade: 'B', credits: 4 },
      ],
      activity: [
        { text: 'You updated Physics 101 grade to A', time: 'Just now' },
        { text: 'Hussnain updated Chemistry Lab', time: '2h ago' },
        { text: 'You added Calculus II course', time: '1d ago' },
      ]
    };

    // Initialize
    function init() {
      const savedSession = localStorage.getItem('parallax-session');
      if (savedSession) {
        try {
          state.user = JSON.parse(savedSession);
          showAppScreen();
        } catch (e) {
          localStorage.removeItem('parallax-session');
          showLoginScreen();
        }
      } else {
        showLoginScreen();
      }

      setupEventListeners();
    }

    function showLoginScreen() {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('app-screen').classList.add('hidden');
    }

    function showAppScreen() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-screen').classList.remove('hidden');
      renderDashboard();
    }

    function setupEventListeners() {
      document.getElementById('login-form').addEventListener('submit', handleLogin);
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
    }

    function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('user-select').value;
      const pin = document.getElementById('pin-input').value;
      const errorDiv = document.getElementById('login-error');

      if (!user || !pin) {
        errorDiv.textContent = 'Please select a user and enter PIN';
        errorDiv.style.display = 'block';
        return;
      }

      if (!/^\d{4}$/.test(pin)) {
        errorDiv.textContent = 'PIN must be 4 digits';
        errorDiv.style.display = 'block';
        return;
      }

      state.user = { name: user };
      localStorage.setItem('parallax-session', JSON.stringify(state.user));
      showAppScreen();
    }

    function handleLogout() {
      if (confirm('Logout?')) {
        localStorage.removeItem('parallax-session');
        state.user = null;
        document.getElementById('login-form').reset();
        showLoginScreen();
      }
    }

    function renderDashboard() {
      const coursesList = document.getElementById('courses-list');
      coursesList.innerHTML = state.courses.map(c => `
        <div style="background: #0a0a0a; padding: 12px; border-radius: 8px; border-left: 3px solid #00C896;">
          <div style="font-weight: bold;">${c.name}</div>
          <div style="font-size: 12px; color: rgba(255,255,255,0.6);">${c.credits} credits • Grade: ${c.grade}</div>
        </div>
      `).join('');

      const activityList = document.getElementById('activity-list');
      activityList.innerHTML = state.activity.map(a => `
        <div style="border-bottom: 1px solid #222; padding-bottom: 12px;">
          <div style="font-size: 13px;">${a.text}</div>
          <div style="font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px;">${a.time}</div>
        </div>
      `).join('');
    }

    // Start app
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(err => {
        console.warn('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
