<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Parallax</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #040404;
            color: #F1F5F9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .offline-container {
            text-align: center;
            max-width: 400px;
        }

        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3B82F6, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: #CBD5E1;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .status {
            background: #0F172A;
            border: 1px solid #1E293B;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1E293B;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            text-align: left;
            color: #CBD5E1;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #EF4444;
        }

        .status-indicator.online {
            background: #10B981;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 300ms ease-out;
            margin-top: 10px;
        }

        .button:hover {
            background: #2563EB;
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }

        .tips {
            background: #0F172A;
            border-left: 3px solid #F59E0B;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            margin-top: 20px;
        }

        .tips h3 {
            color: #F59E0B;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .tips ul {
            list-style: none;
            font-size: 13px;
            color: #CBD5E1;
        }

        .tips li {
            padding: 5px 0;
        }

        .tips li:before {
            content: "→ ";
            color: #F59E0B;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry, your data is safe!</p>

        <div class="status">
            <div class="status-item">
                <span class="status-label">Connection Status</span>
                <div class="status-indicator" id="connection-indicator"></div>
            </div>
            <div class="status-item">
                <span class="status-label">Last Sync</span>
                <span id="last-sync">Never</span>
            </div>
        </div>

        <button class="button" onclick="checkConnection()">Check Connection</button>

        <div class="tips">
            <h3>What You Can Do:</h3>
            <ul>
                <li>View your saved data</li>
                <li>Add courses and grades offline</li>
                <li>Changes will sync when online</li>
            </ul>
        </div>
    </div>

    <script>
        function checkConnection() {
            fetch('/ping', { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    document.getElementById('connection-indicator').classList.add('online');
                    document.getElementById('connection-indicator').textContent = 'Online';
                    setTimeout(() => {
                        window.location.reload();
                    }, 1000);
                })
                .catch(() => {
                    alert('Still offline. Please check your connection.');
                });
        }

        // Check connection status on load
        window.addEventListener('online', () => {
            document.getElementById('connection-indicator').classList.add('online');
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });

        window.addEventListener('offline', () => {
            document.getElementById('connection-indicator').classList.remove('online');
        });

        // Update last sync time
        const lastSync = localStorage.getItem('parallax_lastSync');
        if (lastSync) {
            document.getElementById('last-sync').textContent = new Date(lastSync).toLocaleString();
        }

        // Initial status check
        if (navigator.onLine) {
            document.getElementById('connection-indicator').classList.add('online');
        }
    </script>
</body>
</html>
